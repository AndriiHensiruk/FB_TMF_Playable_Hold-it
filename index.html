<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>FB TMF Playable Hold it</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Адаптивний контейнер 9:16 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 177.78vw; 
            max-width: 56.25vh; 
            max-height: 100vh;
            background-color: #000;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            cursor: none;
        }

        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .scene.active {
            display: block;
        }

        img {
            position: absolute;
            pointer-events: none;
            max-width: 100%;
        }
        .clickable {
            pointer-events: auto;
            cursor: pointer;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Глобальна кнопка Mute */
        #mute-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 40px;
            height: 40px;
            z-index: 1000;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid #fff;
            border-radius: 50%;
            display: none; 
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.2s;
        }
        #mute-btn:active {
            transform: scale(0.9);
        }

        /* --- Анімації --- */
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.08); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes pulse-normal {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        @keyframes bounce-pointer {
            0%, 100% { transform: translate(-50%, -50%) translateX(70px) translateY(0) scale(1); }
            50% { transform: translate(-50%, -50%) translateX(-32px) translateY(-32px) scale(1.05); }
        }
        @keyframes hand-idle {
            0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            50% { transform: translate(-50%, -50%) scale(1.05) rotate(-3deg); }
        }
        /* Анімація кліку для руки-підказки */
        @keyframes hint-tap {
            0%, 100% { transform: translate(-50%, -50%) scale(1.1); }
            50% { transform: translate(-50%, -50%) scale(0.9); }
        }

        /* --- Сцена 1: Сплеш --- */
        #splash-bg {
            background-image: url('assets/splash_bg.png');
        }
        #splash-btn {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            animation: pulse 1.5s infinite ease-in-out;
        }
        #splash-hand {
            position: absolute;
            top: 58%;
            left: 55%;
            transform: translate(-50%, -50%);
            width: 15%;
            animation: bounce-pointer 1.2s infinite ease-in-out;
        }

        /* --- Сцена 2: Відео + Баббл --- */
        #bubble-img {
            position: absolute;
            top: 15%;
            left: 70%;
            transform: translateX(-50%);
            width: 40%;
            z-index: 10;
        }

        /* --- Сцена 3: Вибір сценарію (Адаптивне центрування) --- */
        .choice-btn-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            gap: 20px;               
            z-index: 10;
            padding: 20px;
        }
        .choice-btn {
            position: relative; 
            width: 120%;     
            max-width: 620px;  
            height: auto;
            object-fit: contain;
            pointer-events: auto;
            cursor: pointer;
            animation: pulse-normal 1.8s infinite ease-in-out;
        }

        /* --- Сцена 4-1: Сценарій "Let him in" --- */
        #scene-let-in {
            z-index: 2;
        }
        #let-in-redirect-btn {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 80%;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #let-in-redirect-btn.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
            animation: pulse 1.5s infinite ease-in-out 0.5s;
        }

        /* --- Сцена 4-2: Гра Hold the door --- */
        #hold-title {
            position: absolute;
            top: 22%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 5;
            opacity: 0;
        }
        #hold-title.slide-up {
            opacity: 0 !important;
            transform: translate(-50%, -50px);
        }
        
        /* Рука-підказка, яка показує де клікати спочатку */
        #hold-hint-hand {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 22%;
            z-index: 101;
            pointer-events: none;
            animation: hint-tap 1.2s infinite ease-in-out;
            transition: opacity 0.5s ease, transform 0.5s ease;
            opacity: 0; /* з'явиться разом із надписом */
        }
        #hold-hint-hand.slide-up {
            opacity: 0 !important;
            transform: translate(-50%, -100px); /* зникає вгору синхронно з тайтлом */
        }

        /* Основна ігрова рука, яка слідує за курсором */
        #hold-hand {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 22%;
            z-index: 100;
            pointer-events: none;
            opacity: 0; /* прихована, доки гравець не активує ігровий режим */
            transition: opacity 0.4s ease, transform 0.1s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        .hand-waiting {
            animation: hand-idle 1.6s infinite ease-in-out;
        }
        .hand-pressed {
            transform: translate(-50%, -50%) scale(0.8) rotate(-8deg) !important;
            filter: brightness(0.95);
        }

        #progress-container {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 18px;
            background: rgba(7, 0, 0, 0.6);
            border: 2px solid #0d0000;
            border-radius: 10px;
            overflow: hidden;
            display: none; /* приховано за замовчуванням */
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 5;
        }
        #progress-container.show {
            display: block;
            opacity: 1;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #fe001e, #fe4f60);
            transition: width 0.05s linear;
        }

        /* --- Сцена 5: Фінал --- */
        #cta-btn {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65%;
            animation: pulse 1.5s infinite ease-in-out;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }
        #cta-btn.show {
            opacity: 1;
            pointer-events: auto;
        }
        
        #cta-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #cta-text.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="game-container">

        <div id="mute-btn" class="clickable">🔊</div>

        <!-- СЦЕНА 1: СПЛЕШ -->
        <div id="scene-splash" class="scene active">
            <div id="splash-bg" class="scene active"></div>
            <img id="splash-btn" class="clickable" src="assets/splash_btn.png" alt="Play">
        </div>

        <!-- СЦЕНА 2: ВІДЕО ТА БАББЛ -->
        <div id="scene-video-bubble" class="scene">
            <video id="main-video" playsinline muted></video>
            <img id="bubble-img" src="assets/bubble.png" alt="Bubble" style="display: none;">
        </div>

        <!-- СЦЕНА 3: ВИБІР СЦЕНАРІЮ -->
        <div id="scene-choice" class="scene">
            <video id="choice-bg-video" playsinline muted></video> 
            <div class="choice-btn-container">
                <img id="btn-let-in" class="choice-btn clickable" src="assets/btn_let_in.png" alt="Let him in">
                <img id="btn-hold-door" class="choice-btn clickable" src="assets/btn_hold_door.png" alt="Hold the door">
            </div>
        </div>

        <!-- СЦЕНА 4-1: Сценарій "Let him in" -->
        <div id="scene-let-in" class="scene">
            <video id="let-in-video" playsinline></video>
            <img id="let-in-redirect-btn" class="clickable" src="assets/let_in_intro_btn.png" alt="Get Offer Now">
        </div>

        <!-- СЦЕНА 4-2: Сценарій "Hold the door" (Міні-гра) -->
        <div id="scene-hold-game" class="scene">
            <video id="hold-bg-video" playsinline muted></video> 
            <img id="hold-title" src="assets/hold_title.png" alt="Hold the Door!">
            
            <!-- Окрема рука-підказка для першого дотику -->
            <img id="hold-hint-hand" src="assets/hand_hint_pointer.png" alt="Tap Hint Hand">
            
            <!-- Ігрова рука, що слідує за курсором -->
            <img id="hold-hand" class="hand-waiting" src="assets/hand_pointer.png" alt="Hand">
            
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
        </div>

        <!-- СЦЕНА 5: ФІНАЛ -->
        <div id="scene-final" class="scene">
            <video id="final-video" playsinline></video>
            <img id="cta-text" src="assets/final_text.png" alt="Text">
            <img id="cta-btn" class="clickable" src="assets/cta_btn.png" alt="Play Now">
        </div>

    </div>

    <audio id="bg-music" src="assets/bg_music.mp3" loop></audio>
    <audio id="snd-bubble" src="assets/bubble_voice.mp3"></audio>
    <audio id="snd-let-in-end" src="assets/let_in_voice.mp3"></audio>
    <audio id="snd-final-cta" src="assets/cta_voice.mp3"></audio>

    <script>
        const ASSETS = {
            videoScene2: "assets/scene2_door_open.mp4",  
            videoLetIn: "assets/scene_let_in.mp4",        
            videoHoldDoor: "assets/scene_hold_door.mp4",  
            videoFinal: "assets/scene_final.mp4",     
            clickUrl: "https://your-redirect-link.com"           
        };

        const gameContainer = document.getElementById('game-container');
        const bgMusic = document.getElementById('bg-music');
        const muteBtn = document.getElementById('mute-btn');
        
        let isMuted = false;
        let holdTimer = null;
        let videoPlaybackTimer = null; 
        let autoDismissTimer = null; 
        let holdProgress = 0; 
        const holdDuration = 5000; 
        const updateInterval = 40; 
        let isHolding = false;
        let gameplayActive = false; // Позначає, що фаза підказки минула і триває власне гра

        function toggleMute() {
            isMuted = !isMuted;
            
            muteBtn.textContent = isMuted ? "🔇" : "🔊";

            const audios = document.querySelectorAll('audio');
            audios.forEach(audio => {
                audio.muted = isMuted;
            });

            const videos = document.querySelectorAll('video');
            videos.forEach(video => {
                video.muted = isMuted || video.id === 'main-video' || video.id === 'choice-bg-video' || video.id === 'hold-bg-video'; 
            });
        }

        muteBtn.addEventListener('click', toggleMute);

        function applyGlobalMuteStateToElement(element) {
            element.muted = isMuted;
        }

        function switchScene(fromId, toId) {
            document.getElementById(fromId).classList.remove('active');
            document.getElementById(toId).classList.add('active');
        }

        // --- СЦЕНА 1: СПЛЕШ ---
        document.getElementById('splash-btn').addEventListener('click', () => {
            muteBtn.style.display = "flex";
            bgMusic.volume = 0.4;
            bgMusic.play().catch(e => console.log("Музика заблокована"));
            startScene2();
        });

        // --- СЦЕНА 2: ВІДЕО ТА БАББЛ ---
        function startScene2() {
            switchScene('scene-splash', 'scene-video-bubble');
            const video = document.getElementById('main-video');
            video.src = ASSETS.videoScene2;
            video.load();
            video.play();

            setTimeout(() => {
                const bubble = document.getElementById('bubble-img');
                bubble.style.display = 'block';
                const bubbleVoice = document.getElementById('snd-bubble');
                applyGlobalMuteStateToElement(bubbleVoice);
                bubbleVoice.play();
            }, 1500);

            video.onended = () => {
                startChoiceScene();
            };
        }

        // --- СЦЕНА 3: ВИБІР СЦЕНАРІЮ ---
        function startChoiceScene() {
            switchScene('scene-video-bubble', 'scene-choice');
            
            const choiceBg = document.getElementById('choice-bg-video');
            choiceBg.src = ASSETS.videoScene2;
            choiceBg.load();
            choiceBg.onloadedmetadata = () => {
                choiceBg.currentTime = choiceBg.duration;
            };

            const btnLetIn = document.getElementById('btn-let-in');
            const btnHoldDoor = document.getElementById('btn-hold-door');
            btnLetIn.replaceWith(btnLetIn.cloneNode(true));
            btnHoldDoor.replaceWith(btnHoldDoor.cloneNode(true));

            document.getElementById('btn-let-in').addEventListener('click', () => {
                startLetInScenario();
            });

            document.getElementById('btn-hold-door').addEventListener('click', () => {
                startHoldDoorScenario();
            });
        }

        // --- СЦЕНАРІЙ 1: LET HIM IN ---
        function startLetInScenario() {
            switchScene('scene-choice', 'scene-let-in');
            
            const video = document.getElementById('let-in-video');
            const redirectBtn = document.getElementById('let-in-redirect-btn');

            redirectBtn.classList.remove('show');

            video.src = ASSETS.videoLetIn;
            video.muted = isMuted; 
            video.load();
            video.play().catch(e => console.log("Помилка автоплею:", e));

            redirectBtn.replaceWith(redirectBtn.cloneNode(true));
            document.getElementById('let-in-redirect-btn').addEventListener('click', () => {
                window.open(ASSETS.clickUrl, '_self');
            });

            video.onended = () => {
                document.getElementById('let-in-redirect-btn').classList.add('show');
            };
        }

        // --- СЦЕНАРІЙ 2: HOLD THE DOOR ---
        function startHoldDoorScenario() {
            switchScene('scene-choice', 'scene-hold-game');

            const holdBg = document.getElementById('hold-bg-video');
            holdBg.src = ASSETS.videoHoldDoor;
            holdBg.muted = true; 
            holdBg.loop = false; 
            holdBg.load();
            
            const title = document.getElementById('hold-title');
            const hintHand = document.getElementById('hold-hint-hand');
            const hand = document.getElementById('hold-hand');
            const progressContainer = document.getElementById('progress-container');
            const progressBar = document.getElementById('progress-bar');
            
            const tensionSound = document.getElementById('snd-let-in-end');

            gameplayActive = false;
            
            // Миттєво показуємо напис та руку-підказку без затримок
            title.style.opacity = '1';
            hintHand.style.opacity = '1';
            hand.style.opacity = '0';
            
            tensionSound.loop = true;
            applyGlobalMuteStateToElement(tensionSound);

            function moveHand(e) {
                if (!gameplayActive) return;

                const rect = gameContainer.getBoundingClientRect();
                let x, y;

                if (e.touches && e.touches[0]) {
                    x = e.touches[0].clientX - rect.left;
                    y = e.touches[0].clientY - rect.top;
                } else {
                    x = e.clientX - rect.left;
                    y = e.clientY - rect.top;
                }

                const posX = Math.max(0, Math.min(x, rect.width));
                const posY = Math.max(0, Math.min(y, rect.height));

                hand.style.left = `${posX}px`;
                hand.style.top = `${posY}px`;
            }

            gameContainer.addEventListener('mousemove', moveHand);
            gameContainer.addEventListener('touchmove', moveHand, { passive: true });

            // Одразу вішаємо слухачі на запуск гри
            gameContainer.addEventListener('mousedown', triggerGameActivation);
            gameContainer.addEventListener('touchstart', triggerGameActivation, { passive: true });

            // Автоматичний запуск гри через 5 секунд неактивності
            autoDismissTimer = setTimeout(() => {
                triggerGameActivation();
            }, 5000);

            // Функція активації основної гри (викликається кліком або таймером)
            function triggerGameActivation(e) {
                if (gameplayActive) return;
                
                if (autoDismissTimer) clearTimeout(autoDismissTimer);

                // Видаляємо тимчасовий слухач першого кліку
                gameContainer.removeEventListener('mousedown', triggerGameActivation);
                gameContainer.removeEventListener('touchstart', triggerGameActivation);

                // 1. Синхронно ховаємо напис та підказку вгору
                title.classList.add('slide-up');
                hintHand.classList.add('slide-up');

                setTimeout(() => {
                    hintHand.style.display = 'none';
                }, 500);

                // 2. Активуємо ігровий режим
                gameplayActive = true;

                // 3. Плавно з'являється прогрес-бар та ігрова рука
                progressContainer.classList.add('show');
                hand.style.opacity = '1';

                // Позиціонуємо ігрову руку під курсор/дотик
                if (e) {
                    moveHand(e);
                }

                // 4. Підключаємо основне керування утриманням
                gameContainer.addEventListener('mousedown', startHolding);
                gameContainer.addEventListener('touchstart', startHolding, { passive: true });

                window.addEventListener('mouseup', stopHolding);
                window.addEventListener('touchend', stopHolding);

                // Одразу починаємо утримання, якщо активація була кліком
                if (e) {
                    startHolding(e);
                }
            }

            function playVideoBackward() {
                clearInterval(videoPlaybackTimer);
                videoPlaybackTimer = setInterval(() => {
                    if (holdBg.currentTime > 0.1) {
                        holdBg.currentTime -= 0.08; 
                    } else {
                        holdBg.currentTime = 0;
                        clearInterval(videoPlaybackTimer);
                        if (!isHolding && gameplayActive) {
                            holdBg.play().catch(e => {});
                        }
                    }
                }, 40);
            }

            function playVideoForward() {
                clearInterval(videoPlaybackTimer);
                holdBg.play().catch(e => {});
                
                videoPlaybackTimer = setInterval(() => {
                    if (holdBg.ended || holdBg.currentTime >= holdBg.duration - 0.1) {
                        holdBg.currentTime = 0;
                        holdBg.play().catch(e => {});
                    }
                }, 100);
            }

            function startHolding(e) {
                if (!gameplayActive) return;
                if (isHolding) return;
                isHolding = true;

                hand.classList.remove('hand-waiting');
                hand.classList.add('hand-pressed');

                playVideoForward(); 
                
                tensionSound.play().catch(e => console.log("Звук заблоковано:", e));

                holdTimer = setInterval(() => {
                    holdProgress += (updateInterval / holdDuration) * 100;
                    if (holdProgress >= 100) {
                        holdProgress = 100;
                        endHoldGame(true);
                    }
                    progressBar.style.width = holdProgress + '%';
                }, updateInterval);
            }

            function stopHolding() {
                if (!isHolding) return;
                isHolding = false;

                hand.classList.remove('hand-pressed');
                hand.classList.add('hand-waiting');

                playVideoBackward(); 
                
                tensionSound.pause();

                clearInterval(holdTimer);
            }

            function endHoldGame(success) {
                if (autoDismissTimer) clearTimeout(autoDismissTimer);
                clearInterval(holdTimer);
                clearInterval(videoPlaybackTimer);
                
                tensionSound.pause();
                tensionSound.loop = false;
                tensionSound.currentTime = 0;
                
                gameContainer.removeEventListener('mousemove', moveHand);
                gameContainer.removeEventListener('touchmove', moveHand);
                gameContainer.removeEventListener('mousedown', startHolding);
                gameContainer.removeEventListener('touchstart', startHolding);
                window.removeEventListener('mouseup', stopHolding);
                window.removeEventListener('touchend', stopHolding);

                if (success) {
                    showFinalCTA();
                }
            }
        }

        // --- СЦЕНА 5: ФІНАЛ ---
        function showFinalCTA() {
            document.getElementById('scene-let-in').classList.remove('active');
            document.getElementById('scene-hold-game').classList.remove('active');
            document.getElementById('scene-final').classList.add('active');

            const finalVideo = document.getElementById('final-video');
            const ctaText = document.getElementById('cta-text');
            const ctaBtn = document.getElementById('cta-btn');

            ctaText.classList.remove('show');
            ctaBtn.classList.remove('show');

            finalVideo.src = ASSETS.videoFinal;
            finalVideo.muted = isMuted; 
            finalVideo.loop = false; 
            finalVideo.load();
            finalVideo.play().catch(e => console.log("Помилка відео фіналу:", e));

            const ctaVoice = document.getElementById('snd-final-cta');
            applyGlobalMuteStateToElement(ctaVoice);
            ctaVoice.play().catch(e => console.log("Звук CTA заблоковано"));

            setTimeout(() => {
                ctaText.classList.add('show');
                ctaBtn.classList.add('show');
            }, 2500);

            ctaBtn.addEventListener('click', () => {
                window.open(ASSETS.clickUrl, '_self');
            });
        }
    </script>
</body>
</html>
